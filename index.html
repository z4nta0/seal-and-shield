<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Seal and Shield LLC – Commercial Roofing in Lawrence, Kansas. Full installations, repairs, liquid coatings, TPO, EPDM. Serving all of Kansas and the continental US." />
    <title>Seal and Shield LLC | Commercial Roofing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <form hidden name='contactForm' className="contact__form" onSubmit={handleSubmit} noValidate data-netlify="true">
        <h3 className="contact__form-title">Free Quote Request</h3>
        <div className="contact__form-row">
        <div className="contact__field">
            <label htmlFor="name">Full Name *</label>
            <input
            id="name" name="name" type="text" required
            placeholder="John Smith"
            value={form.name} onChange={handleChange}
            />
        </div>
        <div className="contact__field">
            <label htmlFor="company">Company</label>
            <input
            id="company" name="company" type="text"
            placeholder="ABC Business LLC"
            value={form.company} onChange={handleChange}
            />
        </div>
        </div>
        <div className="contact__form-row">
        <div className="contact__field">
            <label htmlFor="phone">Phone *</label>
            <input
            id="phone" name="phone" type="tel" required
            placeholder="(555) 000-0000"
            value={form.phone} onChange={handleChange}
            />
        </div>
        <div className="contact__field">
            <label htmlFor="email">Email</label>
            <input
            id="email" name="email" type="email"
            placeholder="john@example.com"
            value={form.email} onChange={handleChange}
            />
        </div>
        </div>
        <div className="contact__field contact__field--full">
        <label htmlFor="message">Tell us about your roof</label>
        <textarea
            id="message" name="message" rows={4}
            placeholder="Describe your commercial roof, square footage, current issues, or any questions..."
            value={form.message} onChange={handleChange}
        />
        </div>
        <button type="submit" className="contact__submit">
        Submit Free Quote Request
        </button>
        <p className="contact__form-note">
        No spam. We'll only contact you regarding your roofing inquiry.
        </p>
    </form>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
